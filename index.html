<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>두뇌 산책</title>
<meta name="theme-color" content="#D31145">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<link rel="stylesheet" href="style.css?v=9">
</head>
<body>

<!-- 홈 -->
<section id="screen-home" class="screen active">
  <header class="home-head">
    <img class="brand-logo" src="assets/aia-logo.png" alt="AIA" onerror="this.style.display='none'">
    <img id="mascot" src="assets/mascot.png?v=9" alt="두뇌 산책 마스코트" onerror="this.style.display='none'">
    <h1>두뇌 산책</h1>
    <p id="home-date"></p>
    <p id="home-streak" class="streak"></p>
    <p id="home-player" class="player-chip" title="눌러서 플레이어 바꾸기"></p>
    <p id="home-tip" class="home-tip"></p>
  </header>
  <nav class="home-menu">
    <button class="menu-btn primary" id="btn-daily">
      <span class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg></span>
      <span class="mt"><b>오늘의 훈련</b><small>매일 3가지 두뇌 게임</small></span>
      <span class="mc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg></span>
    </button>
    <button class="menu-btn" id="btn-check">
      <span class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg></span>
      <span class="mt"><b>뇌 나이 체크</b><small>3가지 과제로 재미있게 측정</small></span>
      <span class="mc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg></span>
    </button>
    <button class="menu-btn" id="btn-free">
      <span class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg></span>
      <span class="mt"><b>자유 플레이</b><small>원하는 게임을 골라서</small></span>
      <span class="mc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg></span>
    </button>
    <button class="menu-btn" id="btn-stats">
      <span class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 7 13.5 15.5 8.5 10.5 2 18"></path><path d="M16 7h6v6"></path></svg></span>
      <span class="mt"><b>기록 보기</b><small>도장 달력과 점수 흐름</small></span>
      <span class="mc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg></span>
    </button>
  </nav>
  <div class="toggles">
    <label class="relax-toggle">
      <input type="checkbox" id="chk-relax"><span class="tswitch"></span>여유 모드 (시간 1.5배)
    </label>
    <label class="relax-toggle">
      <input type="checkbox" id="chk-sound" checked><span class="tswitch"></span>소리
    </label>
  </div>
  <footer class="credits">고객총괄본부 상품마케팅팀 제작 · Made by JeongSang</footer>
</section>

<!-- 자유 플레이 게임 선택 -->
<section id="screen-free" class="screen">
  <div class="topbar">
    <button class="back-btn" data-goto="home" aria-label="홈으로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
    </button>
    <h2>어떤 게임을 할까요?</h2>
  </div>
  <div id="free-list" class="free-grid"></div>
  <button class="big-btn ghost" data-goto="home">← 돌아가기</button>
</section>

<!-- 게임 진행 -->
<section id="screen-game" class="screen">
  <div class="game-top">
    <span id="game-name"></span>
    <span id="game-timer"></span>
  </div>
  <div class="timer-bar"><i id="timer-fill"></i></div>
  <div id="game-intro" class="game-intro">
    <img id="intro-icon" class="intro-img" alt="" onerror="this.style.visibility='hidden'">
    <h2 id="intro-title"></h2>
    <p id="intro-desc"></p>
    <p id="intro-best" class="intro-best"></p>
    <button class="big-btn primary" id="btn-go">시작</button>
  </div>
  <div id="game-area"></div>
</section>

<!-- 결과 -->
<section id="screen-result" class="screen">
  <h2 id="result-title"></h2>
  <div id="result-score" class="score-big"></div>
  <p id="result-comment"></p>
  <div id="result-detail"></div>
  <div class="coach">
    <img src="assets/mascot.png?v=9" class="coach-img" alt="코치">
    <div class="speech" id="coach-bubble"></div>
  </div>
  <button class="big-btn primary" id="btn-next"></button>
  <button class="big-btn ghost" data-goto="home">홈으로</button>
</section>

<!-- 기록 -->
<section id="screen-stats" class="screen">
  <div class="topbar">
    <button class="back-btn" data-goto="home" aria-label="홈으로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
    </button>
    <h2>기록</h2>
  </div>
  <div id="stamp-cal"></div>
  <canvas id="chart" width="640" height="280"></canvas>
  <div id="trend-box"></div>
  <div id="best-table"></div>
  <div id="cloud-board"></div>
  <div class="row">
    <button class="big-btn ghost small" id="btn-export">데이터 내보내기</button>
    <button class="big-btn ghost small" id="btn-import">가져오기</button>
    <button class="big-btn ghost small" id="btn-cloud">🌐 온라인 순위</button>
    <input type="file" id="file-import" accept=".json" hidden>
  </div>
  <button class="big-btn ghost" data-goto="home">← 돌아가기</button>
</section>

<script src="games/sound.js?v=9"></script>
<script src="games/cloud.js?v=9"></script>
<script src="games/juice.js?v=9"></script>
<script src="games/calc.js?v=9"></script>
<script src="games/memory.js?v=9"></script>
<script src="games/stroop.js?v=9"></script>
<script src="games/trail.js?v=9"></script>
<script src="games/pack-speed.js?v=9"></script>
<script src="games/pack-memory.js?v=9"></script>
<script src="games/sudoku.js?v=9"></script>
<script src="app.js?v=9"></script>
</body>
</html>

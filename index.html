<!-- @dsCard group="Play" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브레인워크 Brain Walk — 하루 1분 30초 두뇌 습관</title>
<meta name="theme-color" content="#D31145" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#151515" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<link rel="stylesheet" href="style.css?v=52">
</head>
<body>

<!-- 홈 -->
<section id="screen-home" class="screen active">
  <header class="home-head">
    <img class="brand-logo" src="assets/aia-logo.png" alt="AIA" onerror="this.style.display='none'">
    <h1 class="logo-h1"><picture>
      <source media="(prefers-color-scheme: dark)" srcset="assets/logo-dark.png">
      <img class="logo-img" id="mascot" src="assets/logo.png?v=2" alt="브레인워크 Brain Walk" onerror="this.outerHTML='브레인워크'">
    </picture></h1>
    <p class="tagline">하루 1분 30초, 오늘도 가볍게 한 바퀴 🐾</p>
    <p id="home-date"></p>
    <p id="home-streak" class="streak"></p>
    <p id="home-player" class="player-chip" title="눌러서 플레이어 바꾸기"></p>
    <p id="home-tip" class="home-tip"></p>
  </header>
  <nav class="home-menu">
    <button class="menu-btn primary" id="btn-daily">
      <span class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg></span>
      <span class="mt"><b>오늘의 훈련</b><small id="daily-sub">게임당 18초, 5게임 — 딱 1분 30초!</small></span>
      <span class="mc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg></span>
    </button>
    <button class="menu-btn" id="btn-check">
      <span class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg></span>
      <span class="mt"><b>뇌 나이 체크</b><small>누르면 바로 측정 시작 — 몇 살일까요?</small></span>
      <span class="mc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg></span>
    </button>
    <button class="menu-btn" id="btn-free">
      <span class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg></span>
      <span class="mt"><b>자유 플레이</b><small>원하는 게임을 골라서</small></span>
      <span class="mc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg></span>
    </button>
    <button class="menu-btn" id="btn-sudoku">
      <span class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M9 3v18M15 3v18M3 9h18M3 15h18"></path></svg></span>
      <span class="mt"><b>퍼즐 산책</b><small>스도쿠 · 점 잇기 · 화살표 탈출</small></span>
      <span class="mc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg></span>
    </button>
    <button class="menu-btn" id="btn-stats">
      <span class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 7 13.5 15.5 8.5 10.5 2 18"></path><path d="M16 7h6v6"></path></svg></span>
      <span class="mt"><b>기록 보기</b><small>도장 달력과 점수 흐름</small></span>
      <span class="mc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg></span>
    </button>
  </nav>
  <div class="toggles">
    <label class="relax-toggle">
      <input type="checkbox" id="chk-relax"><span class="tswitch"></span>여유 모드 (시간 1.5배)
    </label>
    <label class="relax-toggle">
      <input type="checkbox" id="chk-sound" checked><span class="tswitch"></span>소리
    </label>
    <label class="relax-toggle">
      <input type="checkbox" id="chk-notify"><span class="tswitch"></span>훈련 알림 (설치된 앱)
    </label>
    <label class="relax-toggle">
      <input type="checkbox" id="chk-ink"><span class="tswitch"></span>✍️ 필기 입력 (속산·태블릿 추천)
    </label>
  </div>
  <button id="btn-install" class="big-btn ghost small" hidden>📲 홈 화면에 추가 — 앱처럼 바로 열기</button>
  <div class="shop">
    <button id="shop-toggle" class="big-btn ghost small"></button>
    <div id="shop-list" hidden></div>
  </div>
  <footer class="credits">고객총괄본부 상품마케팅팀 제작 · Made by JeongSang</footer>
</section>

<!-- 자유 플레이 게임 선택 -->
<section id="screen-free" class="screen">
  <div class="topbar">
    <button class="back-btn" data-goto="home" aria-label="홈으로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
    </button>
    <h2>어떤 게임을 할까요?</h2>
  </div>
  <div id="free-list" class="free-grid"></div>
  <button class="big-btn ghost" data-goto="home">← 돌아가기</button>
</section>

<!-- 스도쿠 난이도 선택 -->
<section id="screen-sudoku" class="screen">
  <div class="topbar">
    <button class="back-btn" data-goto="home" aria-label="홈으로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
    </button>
    <h2>퍼즐 산책 — 무엇을 풀까요?</h2>
  </div>
  <div id="sudoku-diffs" class="home-menu"></div>
</section>

<!-- 게임 진행 -->
<section id="screen-game" class="screen">
  <div class="game-top">
    <button id="game-home" class="game-home" aria-label="홈으로" title="홈으로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><path d="M9 22V12h6v10"></path></svg>
    </button>
    <span id="game-name"></span>
    <span id="game-timer"></span>
  </div>
  <div class="timer-bar"><i id="timer-fill"></i></div>
  <div id="ghost-race" hidden><span id="ghost-label"></span><div class="ghost-track"><i id="ghost-fill"></i></div></div>
  <div id="combo-badge" hidden></div>
  <div id="game-hint" class="game-hint"></div>
  <div id="game-intro" class="game-intro">
    <img id="intro-icon" class="intro-img" alt="" onerror="this.style.visibility='hidden'">
    <h2 id="intro-title"></h2>
    <p id="intro-desc"></p>
    <p id="intro-best" class="intro-best"></p>
    <button class="big-btn primary" id="btn-go">시작</button>
  </div>
  <div id="game-area"></div>
</section>

<!-- 결과 -->
<section id="screen-result" class="screen">
  <h2 id="result-title"></h2>
  <div id="result-score" class="score-big"></div>
  <p id="result-comment"></p>
  <div id="result-detail"></div>
  <div class="coach">
    <img src="assets/mascot.png?v=52" class="coach-img" alt="코치">
    <div class="speech" id="coach-bubble"></div>
  </div>
  <button class="big-btn primary" id="btn-next"></button>
  <button class="big-btn ghost" id="btn-ghost-share" hidden>⚔️ 친구에게 대결장 보내기</button>
  <button class="big-btn ghost" data-goto="home">홈으로</button>
</section>

<!-- 기록 -->
<section id="screen-stats" class="screen">
  <div class="topbar">
    <button class="back-btn" data-goto="home" aria-label="홈으로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
    </button>
    <h2>기록</h2>
  </div>
  <div id="stats-who" class="who-chips"></div>
  <div id="stamp-cal"></div>
  <canvas id="chart" width="640" height="280"></canvas>
  <div id="trend-box"></div>
  <div id="best-table"></div>
  <div id="cloud-board"></div>
  <button class="big-btn ghost" data-goto="home">← 돌아가기</button>
</section>

<script src="games/sound.js?v=52"></script>
<script src="games/cloud.js?v=52"></script>
<script src="games/juice.js?v=52"></script>
<script src="games/ink.js?v=52"></script>
<script src="games/calc.js?v=52"></script>
<script src="games/memory.js?v=52"></script>
<script src="games/stroop.js?v=52"></script>
<script src="games/trail.js?v=52"></script>
<script src="games/pack-speed.js?v=52"></script>
<script src="games/pack-memory.js?v=52"></script>
<script src="games/sudoku.js?v=52"></script>
<script src="games/pack-extra.js?v=52"></script>
<script src="games/flow.js?v=52"></script>
<script src="games/arrows.js?v=52"></script>
<script src="app.js?v=52"></script>
</body>
</html>
